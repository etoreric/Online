{% extends "base.html" %}
{% block title %}Admin Setup - StyleShop{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div class="bg-dark bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:60px;height:60px;">
                            <i class="fas fa-user-shield text-dark fa-lg"></i>
                        </div>
                        <h1 class="h4 fw-bold">Admin Portal Setup</h1>
                        <p class="text-muted">Complete your administrator profile</p>
                    </div>
                    
                    <form method="POST" action="{{ url_for('auth.admin_register', token=token) }}">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-user text-muted"></i></span>
                                <input type="text" class="form-control bg-light border-0" id="username" name="username" required placeholder="admin_user">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-envelope text-muted"></i></span>
                                <input type="email" class="form-control bg-light border-0" id="email" name="email" required placeholder="admin@example.com">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label fw-semibold">Phone Number <span class="text-muted fw-normal">(Optional)</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-phone text-muted"></i></span>
                                <input type="tel" class="form-control bg-light border-0" id="phone" name="phone" placeholder="+233...">
                            </div>
                        </div>

                        <!-- Password with suggest + show/hide + strength meter -->
                        <div class="mb-3">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <label for="password" class="form-label fw-semibold mb-0">Secure Password</label>
                                <button type="button" class="btn btn-link btn-sm text-decoration-none p-0"
                                        data-target="password" data-confirm="confirm_password"
                                        onclick="suggestPassword(this)">
                                    <i class="fas fa-magic me-1"></i> Suggest Strong Password
                                </button>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" class="form-control bg-light border-0" id="password" name="password"
                                       required placeholder="••••••••" minlength="8"
                                       oninput="checkStrength(this.value)">
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="toggleVisibility('password', this)" title="Show/hide">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <!-- Strength meter -->
                            <div class="mt-2" id="strength-wrapper" style="display:none;">
                                <div class="progress" style="height:5px; border-radius:4px;">
                                    <div id="strength-bar" class="progress-bar" role="progressbar"
                                         style="width:0%; transition: width .3s, background-color .3s;"></div>
                                </div>
                                <small id="strength-label" class="text-muted mt-1 d-block"></small>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" class="form-control bg-light border-0" id="confirm_password"
                                       name="confirm_password" required placeholder="••••••••" minlength="8">
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="toggleVisibility('confirm_password', this)" title="Show/hide">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold">
                            <i class="fas fa-shield-alt me-2"></i>Complete Admin Setup
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="small text-muted mb-0"><i class="fas fa-info-circle me-1"></i> This is a secure portal invitation link.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function generateStrongPassword() {
    const upper   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const lower   = 'abcdefghijklmnopqrstuvwxyz';
    const digits  = '0123456789';
    const special = '!@#$%^&*()-_=+';
    const all = upper + lower + digits + special;
    let pw = [
        upper[Math.floor(Math.random() * upper.length)],
        lower[Math.floor(Math.random() * lower.length)],
        digits[Math.floor(Math.random() * digits.length)],
        special[Math.floor(Math.random() * special.length)]
    ];
    for (let i = pw.length; i < 14; i++) {
        pw.push(all[Math.floor(Math.random() * all.length)]);
    }
    return pw.sort(() => Math.random() - 0.5).join('');
}

function suggestPassword(btn) {
    const pw = generateStrongPassword();
    const targetInput  = document.getElementById(btn.getAttribute('data-target'));
    const confirmInput = document.getElementById(btn.getAttribute('data-confirm'));

    targetInput.type  = 'text';
    targetInput.value = pw;
    if (confirmInput) {
        confirmInput.type  = 'text';
        confirmInput.value = pw;
    }
    checkStrength(pw);

    navigator.clipboard.writeText(pw).catch(() => {});
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check me-1 text-success"></i> Copied to clipboard!';
    setTimeout(() => { btn.innerHTML = orig; }, 2500);
}

function checkStrength(pw) {
    const wrapper = document.getElementById('strength-wrapper');
    const bar     = document.getElementById('strength-bar');
    const label   = document.getElementById('strength-label');

    if (!pw) { wrapper.style.display = 'none'; return; }
    wrapper.style.display = 'block';

    let score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    const levels = [
        { pct: '20%',  color: '#dc3545', text: '🔴 Very Weak'  },
        { pct: '40%',  color: '#fd7e14', text: '🟠 Weak'       },
        { pct: '60%',  color: '#ffc107', text: '🟡 Fair'       },
        { pct: '80%',  color: '#20c997', text: '🟢 Strong'     },
        { pct: '100%', color: '#198754', text: '✅ Very Strong' },
    ];
    const lvl = levels[Math.min(score, levels.length - 1)];
    bar.style.width           = lvl.pct;
    bar.style.backgroundColor = lvl.color;
    label.textContent         = lvl.text;
}

function toggleVisibility(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon  = btn.querySelector('i');
    if (input.type === 'password') {
        input.type     = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        input.type     = 'password';
        icon.className = 'fas fa-eye';
    }
}
</script>
{% endblock %}
