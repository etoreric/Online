{% extends "base.html" %}
{% block title %}Login - StyleShop{% endblock %}

{% block content %}
<div class="container py-5" id="login-page">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:60px;height:60px;">
                            <i class="fas fa-user text-primary fa-lg"></i>
                        </div>
                        <h1 class="h4 fw-bold">Welcome Back</h1>
                        <p class="text-muted">Sign in to your account</p>
                    </div>
                    <form method="POST" action="{{ url_for('auth.login') }}" id="login-form">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope text-muted"></i></span>
                                <input type="email" class="form-control" id="email" name="email" required placeholder="you@example.com" autofocus>
                            </div>
                        </div>
                        <div class="mb-4">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <label for="password" class="form-label mb-0">Password</label>
                                <a href="{{ url_for('auth.request_password_reset') }}" class="small text-decoration-none text-muted">Forgot Password?</a>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" class="form-control" id="password" name="password" required placeholder="Enter your password">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="login-btn">Sign In</button>
                    </form>
                    <div class="text-center mt-4">
                        <p class="text-muted mb-0">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-semibold">Create one</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
